const SYS=`You are Dex, a warm, patient virtual assistant for Direct Express — a prepaid debit Mastercard for federal benefit recipients. You are speaking with Maggie, a senior cardholder.

async function askAI(text){
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts:[{text:SYS}]},
      contents:[{parts:[{text}]}],
      generationConfig:{maxOutputTokens:200,temperature:0.7}
    })
  });
  const d=await res.json();
  if(!res.ok) throw new Error(`Gemini ${res.status}: ${d.error?.message||'unknown error'}`);
  if(!d.candidates?.[0]?.content?.parts?.[0]?.text) throw new Error('No response from Gemini');
  return d.candidates[0].content.parts[0].text;
}

  const C={
    balance:`<div class="card" style="border-left-color:#1a5c32"><div class="card-label">${IC.card} Direct Express •••• 4823</div><div class="card-amount">$612.47</div><div class="card-meta">Available Balance</div><hr class="card-divider"/><div class="card-footer">${IC.clock} Next deposit: <strong style="color:#111">$967.00</strong> &nbsp;·&nbsp; April 3, 2026</div></div>`,
    txns:`<div class="card" style="border-left-color:#1a5c32"><div class="card-label">${IC.list} Recent Transactions</div>${txRows}</div>`,
    locked:`<div class="card" style="border-left-color:#dc2626"><div class="card-header"><div class="card-icon" style="background:#fef2f2">${IC.lock}</div><div><div class="card-title">Card Locked — You're Protected</div><div class="card-sub">Card ending 4823</div></div></div><div class="card-row">${IC.check} Card locked — no new charges possible</div><div class="card-row">${IC.check} Replacement card being mailed to you</div><div class="card-row">${IC.check} Arrives in 5–7 business days</div><div class="card-row">${IC.check} You will receive a text when it ships</div></div>`,
    dispute:`<div class="card" style="border-left-color:#f59e0b"><div class="card-header"><div class="card-icon" style="background:#fffbeb">${IC.alert}</div><div><div class="card-title">Dispute Opened${disputedMerchant?' — '+disputedMerchant:''}</div><div class="card-sub">Case number assigned</div></div></div><div class="card-row">${IC.check} Dispute recorded and assigned a case number</div><div class="card-row">${IC.clock} Investigation: up to 10 business days</div><div class="card-row">${IC.dollar} Provisional credit may be issued within 5 days</div><div class="card-row">${IC.phone} We will contact you with updates</div></div>`,
    deposit:`<div class="card" style="border-left-color:#6366f1"><div class="card-label">${IC.refresh} Next Deposit</div><div class="card-amount">$967.00</div><div class="card-meta">Social Security</div><hr class="card-divider"/><div class="card-footer">${IC.clock} Arriving <strong style="color:#111">Friday, April 3, 2026</strong></div></div>`,
    pin:`<div class="card" style="border-left-color:#8b5cf6"><div class="card-header"><div class="card-icon" style="background:#f5f3ff">${IC.lockPurple}</div><div><div class="card-title">Reset Your PIN</div><div class="card-sub">Takes about 2 minutes</div></div></div><div class="pin-step"><div class="pin-num">1</div>Call 1-888-741-1115</div><div class="pin-step"><div class="pin-num">2</div>Press 2 for PIN services</div><div class="pin-step"><div class="pin-num">3</div>Follow the voice prompts</div><div class="pin-step"><div class="pin-num">4</div>New PIN works immediately</div></div>`,
    fees:`<div class="card" style="border-left-color:#0ea5e9"><div class="card-label">${IC.card} Your Card Fees</div><div class="fee-row"><span>Purchases anywhere</span><strong>Free — always</strong></div><div class="fee-row"><span>1st ATM withdrawal / month</span><strong>Free</strong></div><div class="fee-row"><span>Additional ATM withdrawals</span><strong>$0.85 each</strong></div><div class="fee-row"><span>Cash at a bank counter</span><strong>$1.50</strong></div><div class="fee-row"><span>Out-of-network ATM</span><strong>$3.00</strong></div><div class="fee-row"><span>Balance check at register</span><strong>Free</strong></div><div class="fee-row"><span>Monthly maintenance fee</span><strong>$0</strong></div></div>`
  };
  return C[type]||'';
}

// ── Scripts ───────────────────────────────────────────────────────────────────

// ── ElevenLabs ────────────────────────────────────────────────────────────────
const EL_VOICE='EXAVITQu4vr4xnSDxMaL';
function initElKey(){const s=localStorage.getItem('el_key');if(s){elKey=s;setElStatus(true);}}
function saveElKey(){const v=document.getElementById('el-input').value.trim();if(!v){alert('Please paste your ElevenLabs API key.');return;}elKey=v;localStorage.setItem('el_key',v);document.getElementById('el-input').value='';setElStatus(true);speak('Hi Maggie, this is what I sound like. Much better, right?');}
function setElStatus(ok){const s=document.getElementById('el-status'),l=document.getElementById('el-link');if(ok){s.textContent='✅ Natural voice enabled';s.className='ok';document.getElementById('el-bar').style.background='#0a1f0a';l.style.display='none';}else{s.textContent='❌ Key error';s.className='err';}}

async function speakEl(text){
  try{
    const models=['eleven_turbo_v2_5','eleven_turbo_v2','eleven_monolingual_v1','eleven_multilingual_v2'];
    let res,lastError;
    for(const model of models){
      res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE}`,{method:'POST',headers:{'xi-api-key':elKey,'Content-Type':'application/json','Accept':'audio/mpeg'},body:JSON.stringify({text,model_id:model,voice_settings:{stability:0.50,similarity_boost:0.82}})});
      if(res.ok)break;
      const err=await res.clone().json().catch(()=>({}));
      lastError=`${res.status}: ${err?.detail?.message||'unknown'}`;
    }
    if(!res.ok){document.getElementById('el-status').textContent=`❌ ${lastError}`;document.getElementById('el-status').className='err';return false;}
    const blob=await res.blob(),url=URL.createObjectURL(blob);
    currentAudio=new Audio(url);
    currentAudio.onplay=()=>{speaking=true;document.getElementById('pause-btn').style.display='flex';};
    currentAudio.onended=()=>{speaking=false;document.getElementById('pause-btn').style.display='none';URL.revokeObjectURL(url);};
    currentAudio.onerror=()=>{speaking=false;document.getElementById('pause-btn').style.display='none';};
    await currentAudio.play();return true;
  }catch(e){document.getElementById('el-status').textContent=`❌ ${e.message}`;document.getElementById('el-status').className='err';return false;}
}

function pickVoice(){
  if(_chosenVoice)return _chosenVoice;
  const vv=window.speechSynthesis.getVoices();
  const p=['Samantha (Enhanced)','Karen (Enhanced)','Microsoft Aria Online (Natural)','Microsoft Jenny Online (Natural)','Google US English','Samantha','Karen','Microsoft Aria','Microsoft Zira'];
  for(const n of p){const v=vv.find(v=>v.name===n);if(v){_chosenVoice=v;return v;}}
  return vv.find(v=>v.lang==='en-US'&&v.localService)||vv.find(v=>v.lang==='en-US')||null;
}
function speakBrowser(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.78;u.pitch=1.05;u.volume=1.0;
  const go=()=>{const v=pickVoice();if(v)u.voice=v;u.onstart=()=>{speaking=true;document.getElementById('pause-btn').style.display='flex';};u.onend=()=>{speaking=false;document.getElementById('pause-btn').style.display='none';};u.onerror=()=>{speaking=false;document.getElementById('pause-btn').style.display='none';};window.speechSynthesis.speak(u);};
  window.speechSynthesis.getVoices().length?go():(window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;go();});
}
async function speak(text){if(!voiceOn)return;stopSpeak();if(elKey){const ok=await speakEl(text);if(ok)return;}speakBrowser(text);}
function stopSpeak(){window.speechSynthesis?.cancel();if(currentAudio){currentAudio.pause();currentAudio=null;}speaking=false;document.getElementById('pause-btn').style.display='none';}
function toggleVoice(){voiceOn=!voiceOn;if(!voiceOn)stopSpeak();document.getElementById('vt-btn').textContent=voiceOn?'Voice On':'Voice Off';}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  initElKey();
  initSpeech();
  const w='Hi Maggie. What can I help you with today?';
  addMsg('bot',w);
  setTimeout(()=>speak(w),500);
});

// ── Speech recognition ────────────────────────────────────────────────────────
function initSpeech(){
  if(!('SpeechRecognition' in window||'webkitSpeechRecognition' in window)){
    document.getElementById('mic-btn').innerHTML='Voice not supported — use Chrome';
    document.getElementById('mic-btn').disabled=true;return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{micStream=s;}).catch(()=>showErr('Microphone access denied. Click 🔒 in the address bar.'));
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();rec.continuous=false;rec.interimResults=true;rec.lang='en-US';
  rec.onresult=e=>{let interim='',final='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)final+=t;else interim+=t;}if(final)pending+=final;document.getElementById('listen-txt').textContent=interim?`"${interim}"`:' 🎙 Listening — speak now...';};
  rec.onerror=e=>{setListening(false);const msgs={'no-speech':"I didn't hear anything. Please try again.",'not-allowed':"Microphone blocked. Click 🔒 in the address bar."};showErr(msgs[e.error]||"Couldn't hear you. Please try again.");};
  rec.onend=()=>{setListening(false);if(pending.trim()){const t=pending.trim();pending='';send(t);}};
}
function toggleMic(){if(!rec)return;if(listening){rec.stop();setListening(false);return;}stopSpeak();pending='';hideErr();try{rec.start();setListening(true);}catch{setTimeout(()=>{rec.start();setListening(true);},300);}}
function setListening(v){
  listening=v;
  const btn=document.getElementById('mic-btn'),bar=document.getElementById('listen-bar');
  if(v){btn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> Tap when done speaking`;btn.classList.add('on');bar.style.display='block';}
  else{btn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> Tap to Speak`;btn.classList.remove('on');bar.style.display='none';document.getElementById('listen-txt').textContent='🎙 Listening — speak now...';}
}

// ── Send ──────────────────────────────────────────────────────────────────────
function getScripted(text){for(const s of SCRIPTS){if(s.match.test(text))return s;}return null;}

async function send(text){
  if(!text.trim())return;
  hideErr();document.getElementById('qa').style.display='none';
  addMsg('user',text);showTyping();
  const merchant=detectMerchant(text);
  if(merchant)disputedMerchant=merchant;
  const scripted=getScripted(text);
  try{
    let reply,card=null,followups=[];
    if(scripted){
      card=scripted.card;
      followups=scripted.followups||[];
      reply=(card==='dispute'&&disputedMerchant)
        ?`Got it and we're on it. I've opened a dispute for the ${disputedMerchant} charge and the details are on screen. Is there anything else I can help with?`
        :scripted.reply;
    } else {
      reply=await askAI(text);
    }
    hideTyping();
    addMsg('bot',reply);
    if(card){const w=document.createElement('div');w.innerHTML=cardHTML(card);document.getElementById('chat').appendChild(w);}
    if(followups.length)showFU(followups);
    speak(reply);
    scroll();
  }catch(e){
    hideTyping();
    const fb=`I'm having a little trouble — ${e.message}. Please call us at 1-888-741-1115.`;
    addMsg('bot',fb);speak(fb);
  }
}

function qs(t){send(t);}
function sendTxt(){const v=document.getElementById('txt').value.trim();if(!v)return;document.getElementById('txt').value='';updSend();send(v);}
function onTxtInput(){updSend();}
function onTxtKey(e){if(e.key==='Enter')sendTxt();}
function updSend(){document.getElementById('send').className=document.getElementById('txt').value.trim()?'on':'';}
function showFU(chips){const area=document.getElementById('chat');const row=document.createElement('div');row.className='fu-row';chips.forEach(c=>{const b=document.createElement('button');b.className='fu';b.textContent=c;b.onclick=()=>{row.remove();send(c);};row.appendChild(b);});area.appendChild(row);scroll();}
function addMsg(role,text){const a=document.getElementById('chat');const row=document.createElement('div');row.className=`msg-row ${role}`;if(role==='bot')row.innerHTML=`<div class="avatar">${IC.shield}</div><div class="bubble bot">${esc(text)}</div>`;else row.innerHTML=`<div class="bubble user">${esc(text)}</div>`;a.appendChild(row);scroll();}
function showTyping(){const a=document.getElementById('chat');const row=document.createElement('div');row.className='dots-row';row.id='typing';row.innerHTML=`<div class="avatar">${IC.shield}</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;a.appendChild(row);scroll();}
function hideTyping(){document.getElementById('typing')?.remove();}
function scroll(){setTimeout(()=>document.getElementById('anchor').scrollIntoView({behavior:'smooth'}),60);}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showErr(m){const e=document.getElementById('err-bar');e.textContent=m;e.style.display='block';}
function hideErr(){document.getElementById('err-bar').style.display='none';}
function toggleLarge(){lgText=!lgText;document.body.classList.toggle('lg',lgText);document.getElementById('lt-btn').textContent=lgText?'Normal Text':'Large Text';}
</script>
