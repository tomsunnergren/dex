<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Direct Express — Dex</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f0;height:100vh;display:flex;flex-direction:column;font-size:16px;}

/* ElevenLabs bar */
#el-bar{background:#0f172a;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;font-size:13px;}
#el-bar span{color:rgba(255,255,255,.55);white-space:nowrap;}
#el-input{flex:1;max-width:300px;padding:7px 12px;border-radius:7px;border:none;font-size:13px;background:#1e293b;color:#fff;outline:none;}
#el-input::placeholder{color:#475569;}
#el-save{padding:7px 14px;border-radius:7px;background:#6366f1;border:none;color:#fff;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;}
#el-status{font-size:12px;white-space:nowrap;color:#94a3b8;}
#el-status.ok{color:#22c55e;}
#el-status.err{color:#f87171;}
#el-link{color:#818cf8;font-size:12px;text-decoration:none;white-space:nowrap;}
#el-link:hover{text-decoration:underline;}

/* Header */
#header{background:#1B6B3A;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo-pill{background:#fff;border-radius:5px;padding:3px 10px;font-weight:900;font-size:13px;color:#1B6B3A;letter-spacing:.5px;}
.hdr-title{color:#fff;font-weight:700;font-size:17px;}
.hdr-sub{color:rgba(255,255,255,.55);font-size:11px;}
.hdr-btns{display:flex;gap:8px;}
.hdr-btn{background:rgba(255,255,255,.18);border:none;border-radius:8px;padding:7px 12px;color:#fff;cursor:pointer;font-size:13px;font-weight:600;}
.hdr-btn:hover{background:rgba(255,255,255,.28);}

/* Account bar */
#acct-bar{background:#145530;padding:7px 18px;display:flex;justify-content:space-between;flex-shrink:0;}
#acct-bar span{color:rgba(255,255,255,.75);font-size:13px;}
#bal{color:#86efac;font-weight:700;}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:14px 14px 6px;max-width:580px;width:100%;margin:0 auto;}
.msg-row{display:flex;margin-bottom:12px;align-items:flex-end;gap:8px;animation:fadeUp .25s ease;}
.msg-row.user{justify-content:flex-end;}
.avatar{width:34px;height:34px;border-radius:50%;background:#1B6B3A;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.bubble{max-width:78%;padding:13px 16px;font-size:16px;line-height:1.6;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.bubble.bot{background:#fff;color:#111;border-radius:18px 18px 18px 4px;}
.bubble.user{background:#1B6B3A;color:#fff;border-radius:18px 18px 4px 18px;}
.dots-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:12px;}
.dots{display:flex;gap:5px;padding:14px 18px;background:#fff;border-radius:18px 18px 18px 4px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.dot{width:8px;height:8px;border-radius:50%;background:#1B6B3A;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}

/* Follow-up chips */
.fu-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;padding-left:42px;}
.fu{background:#fff;border:1.5px solid #bbf7d0;border-radius:20px;padding:7px 14px;font-size:14px;color:#166534;cursor:pointer;font-weight:500;transition:background .15s;}
.fu:hover{background:#f0fdf4;}

/* Info cards */
.card{border-radius:14px;padding:16px;margin-bottom:14px;border:2px solid;box-shadow:0 2px 8px rgba(0,0,0,.06);animation:fadeUp .25s ease;}
.crow{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:14px;line-height:1.4;}

/* Quick actions */
#qa{margin-top:4px;}
#qa p{font-size:13px;color:#9ca3af;margin-bottom:8px;text-align:center;}
.qbtn{width:100%;text-align:left;padding:13px 16px;margin-bottom:7px;background:#fff;border:1.5px solid #d1fae5;border-radius:12px;cursor:pointer;font-size:16px;color:#166534;font-weight:500;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:background .15s;}
.qbtn:hover{background:#f0fdf4;}

/* Banners */
#listen-bar{background:#ecfdf5;border-top:1px solid #a7f3d0;padding:10px 16px;text-align:center;max-width:580px;width:100%;margin:0 auto;display:none;flex-shrink:0;}
#listen-bar span{color:#065f46;font-size:15px;}
#err-bar{background:#fff7ed;border-top:1px solid #fed7aa;padding:9px 16px;text-align:center;color:#9a3412;font-size:14px;max-width:580px;width:100%;margin:0 auto;display:none;flex-shrink:0;}

/* Input */
#input-area{background:#fff;border-top:1px solid #e5e7eb;padding:11px 14px;max-width:580px;width:100%;margin:0 auto;flex-shrink:0;}
#mic-btn{width:100%;padding:17px;border-radius:14px;border:none;background:#1B6B3A;color:#fff;font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;transition:background .2s;}
#mic-btn.on{background:#dc2626;animation:pulse 1.5s infinite;}
#pause-btn{width:100%;margin-bottom:8px;padding:9px;border-radius:10px;border:2px solid #1B6B3A;background:transparent;color:#1B6B3A;cursor:pointer;font-size:14px;font-weight:600;display:none;align-items:center;justify-content:center;gap:6px;}
#trow{display:flex;gap:7px;}
#txt{flex:1;padding:11px 14px;border-radius:10px;border:1.5px solid #d1d5db;font-size:16px;outline:none;color:#111;}
#txt:focus{border-color:#1B6B3A;}
#send{padding:11px 18px;border-radius:10px;background:#9ca3af;border:none;color:#fff;cursor:default;font-weight:700;font-size:15px;transition:background .2s;}
#send.on{background:#1B6B3A;cursor:pointer;}

/* Footer */
#footer{background:#f9fafb;border-top:1px solid #e5e7eb;padding:8px 16px;text-align:center;font-size:13px;color:#6b7280;flex-shrink:0;}
#footer strong{color:#1B6B3A;}

body.lg{font-size:19px;}
body.lg .bubble{font-size:19px;}
body.lg .qbtn{font-size:19px;}
body.lg #mic-btn{font-size:22px;}

@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
</style>

<script>
// ── Account data ──────────────────────────────────────────────────────────────
const TX = [
  {date:"Mar 23",merchant:"Walgreens",amt:-18.43},
  {date:"Mar 22",merchant:"Kroger",amt:-54.81},
  {date:"Mar 21",merchant:"National Grid",amt:-72.50},
  {date:"Mar 20",merchant:"CVS Pharmacy",amt:-11.29},
  {date:"Mar 19",merchant:"McDonald's",amt:-9.17},
  {date:"Mar 15",merchant:"Social Security Deposit",amt:+967.00},
  {date:"Mar 12",merchant:"Rite Aid",amt:-22.64},
  {date:"Mar 10",merchant:"Dollar General",amt:-14.38},
];

// ── Scripts ───────────────────────────────────────────────────────────────────
const SCRIPTS = [
  {
    match: /balance|how much|available|funds|money.*(card|account)/i,
    card: 'balance',
    reply: `I've pulled up your balance on screen. Does everything look right?`,
    followups: ["Show my recent transactions", "When is my next deposit?", "Something doesn't look right"]
  },
  {
    match: /transaction|history|recent|spent|purchase|statement|charges|show me/i,
    card: 'txns',
    reply: `Here are your recent transactions. Do you recognize everything on the list?`,
    followups: ["Something doesn't look right", "What is my balance?", "When is my next deposit?"]
  },
  {
    match: /lost|stolen|missing.*card|can't find.*card|someone.*used|unauthorized|fraud|lock.*card/i,
    card: 'locked',
    reply: `I've locked your card right now so nothing can go through. I've put the next steps on screen for you. Is there anything else I can help with?`,
    followups: ["Will I still get my deposit?", "How do I activate the new card?", "What if I find my old card?"]
  },
  {
    match: /dispute|don't recognize|do not recognize|didn't make|wrong charge|suspicious|unauthorized charge|unusual|these charges|this charge|not mine/i,
    card: 'dispute',
    reply: `I'm sorry to hear that. I've put the details on screen. Which transaction looks wrong — do you see it in the list?`,
    followups: ["It was the Amazon charge", "It was the Walgreens charge", "Show me my transactions"]
  },
  {
    match: /deposit|payment|social security|ssa|benefit.*arrive|when.*money|direct deposit/i,
    card: 'deposit',
    reply: `I've pulled up your next deposit on screen. Does that look right to you?`,
    followups: ["What is my current balance?", "What if it doesn't arrive?", "Show my recent transactions"]
  },
  {
    match: /deposit.*not.*arrive|missing.*deposit|didn't.*receive|where.*deposit|deposit.*late/i,
    card: 'deposit',
    reply: `Most deposits arrive by nine in the morning. If it's still not there by end of day, call us at one eight eight eight, seven four one, one one one five and we'll sort it out. Is there anything else I can help with?`,
    followups: ["What is my balance?", "Show my recent transactions", "Talk to someone"]
  },
  {
    match: /pin|password|forgot.*pin|change.*pin|reset.*pin/i,
    card: 'pin',
    reply: `Resetting your PIN is easy. I've put the steps on screen — it only takes about two minutes. Is there anything else I can help with?`,
    followups: ["What if I can't remember my old PIN?", "What is my balance?", "Talk to someone"]
  },
  {
    match: /fee|fees|cost|how much.*charge|charges.*card|what.*cost/i,
    card: 'fees',
    reply: `I've pulled up your card fees on screen. The good news is most things are free. Any questions about what you see?`,
    followups: ["What is my current balance?", "How do I find a free ATM?", "When is my next deposit?"]
  },
  {
    match: /activate|new card|activate.*card|card.*activate/i,
    card: null,
    reply: `To activate your new card, call one eight eight eight, seven four one, one one one five. Have your card and the last four digits of your Social Security number ready. It only takes a couple of minutes. Is there anything else I can help with?`,
    followups: ["How do I set my PIN?", "What is my balance?", "Talk to someone"]
  },
  {
    match: /address|change.*address|update.*address|move|new address/i,
    card: null,
    reply: `To update your address, call us at one eight eight eight, seven four one, one one one five. Have your card and Social Security number handy. Is there anything else I can help with?`,
    followups: ["Will my next deposit still arrive?", "What is my balance?", "Talk to someone"]
  },
  {
    match: /atm|cash|withdraw/i,
    card: null,
    reply: `Your first withdrawal each month is free. After that it's eighty-five cents at in-network ATMs. Look for Allpoint or MoneyPass to avoid fees. Is there anything else I can help with?`,
    followups: ["What is my current balance?", "What are all my card fees?", "When is my next deposit?"]
  },
  {
    match: /speak|agent|representative|human|real person|call|talk.*someone/i,
    card: null,
    reply: `Of course. Call us any time at one eight eight eight, seven four one, one one one five — we're available around the clock. Is there anything else before you call?`,
    followups: ["What is my balance?", "Show my recent transactions", "When is my next deposit?"]
  },
  {
    match: /find my card|found my card|card showed up/i,
    card: null,
    reply: `That's great news. Since we already locked the old card, call us at one eight eight eight, seven four one, one one one five to get it reactivated. Is there anything else I can help with?`,
    followups: ["What is my balance?", "When is my next deposit?", "Talk to someone"]
  },
  {
    match: /still get.*deposit|deposit.*still come|affect.*deposit/i,
    card: 'deposit',
    reply: `Yes — locking your card has no effect on your deposits. Your next deposit will arrive right on schedule. I've pulled it up on screen.`,
    followups: ["What is my balance?", "How do I activate the new card?", "Talk to someone"]
  },
  {
    match: /thank|thanks|thank you|that helps|helpful/i,
    card: null,
    reply: `You're very welcome, Maggie. Is there anything else I can help with today?`,
    followups: ["Check my balance", "Show my recent transactions", "When is my next deposit?"]
  },
  {
    match: /hi|hello|hey|good morning|good afternoon|good evening/i,
    card: null,
    reply: `Hi Maggie, good to hear from you. What can I help with today?`,
    followups: ["Check my balance", "I lost my card", "When is my next deposit?"]
  }
];

const DEFAULT = {
  reply: `I want to make sure I get you the right help. I can assist with your balance, recent transactions, a lost card, a disputed charge, your deposit, your PIN, or card fees. What would you like help with?`,
  followups: ["Check my balance", "I lost my card", "Dispute a charge", "When is my next deposit?"]
};

// ── State ─────────────────────────────────────────────────────────────────────
let voiceOn=true, speaking=false, listening=false;
let rec=null, micStream=null, pending='', lgText=false;
let conversationContext=[];
let _chosenVoice=null;
let elKey='';
let currentAudio=null;
const EL_VOICE='EXAVITQu4vr4xnSDxMaL'; // Sarah — warm, natural, free tier

// ── ElevenLabs ────────────────────────────────────────────────────────────────
function initElKey(){
  const saved=localStorage.getItem('el_key');
  if(saved){ elKey=saved; setElStatus(true); }
}

function saveElKey(){
  const v=document.getElementById('el-input').value.trim();
  if(!v){ alert('Please paste your ElevenLabs API key.'); return; }
  elKey=v;
  localStorage.setItem('el_key',v);
  document.getElementById('el-input').value='';
  setElStatus(true);
  speak('Hi Maggie, this is what I sound like. Much better, right?');
}

function setElStatus(ok){
  const s=document.getElementById('el-status');
  const l=document.getElementById('el-link');
  if(ok){
    s.textContent='✅ Natural voice enabled'; s.className='ok';
    document.getElementById('el-bar').style.background='#052e16';
    l.style.display='none';
  } else {
    s.textContent='❌ Key error — check and try again'; s.className='err';
  }
}

async function speakEl(text){
  try{
    const models=['eleven_turbo_v2_5','eleven_turbo_v2','eleven_monolingual_v1','eleven_multilingual_v2'];
    let res, lastError;
    for(const model of models){
      res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE}`,{
        method:'POST',
        headers:{'xi-api-key':elKey,'Content-Type':'application/json','Accept':'audio/mpeg'},
        body:JSON.stringify({text, model_id:model, voice_settings:{stability:0.50,similarity_boost:0.82}})
      });
      if(res.ok) break;
      const err=await res.clone().json().catch(()=>({}));
      lastError=`${res.status}: ${err?.detail?.message||'unknown'}`;
    }
    if(!res.ok){
      document.getElementById('el-status').textContent=`❌ ${lastError}`;
      document.getElementById('el-status').className='err';
      return false;
    }
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    currentAudio=new Audio(url);
    currentAudio.onplay=()=>{ speaking=true; document.getElementById('pause-btn').style.display='flex'; };
    currentAudio.onended=()=>{ speaking=false; document.getElementById('pause-btn').style.display='none'; URL.revokeObjectURL(url); };
    currentAudio.onerror=()=>{ speaking=false; document.getElementById('pause-btn').style.display='none'; };
    await currentAudio.play();
    return true;
  }catch(e){
    document.getElementById('el-status').textContent=`❌ ${e.message}`;
    document.getElementById('el-status').className='err';
    return false;
  }
}

// ── Browser TTS fallback ──────────────────────────────────────────────────────
function pickVoice(){
  if(_chosenVoice) return _chosenVoice;
  const vv=window.speechSynthesis.getVoices();
  const priority=['Samantha (Enhanced)','Karen (Enhanced)','Microsoft Aria Online (Natural)','Microsoft Jenny Online (Natural)','Google US English','Samantha','Karen','Microsoft Aria','Microsoft Zira'];
  for(const name of priority){ const v=vv.find(v=>v.name===name); if(v){_chosenVoice=v;return v;} }
  return vv.find(v=>v.lang==='en-US'&&v.localService)||vv.find(v=>v.lang==='en-US')||null;
}

function speakBrowser(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.78; u.pitch=1.05; u.volume=1.0;
  const go=()=>{ const v=pickVoice(); if(v) u.voice=v;
    u.onstart=()=>{ speaking=true; document.getElementById('pause-btn').style.display='flex'; };
    u.onend=()=>{ speaking=false; document.getElementById('pause-btn').style.display='none'; };
    u.onerror=()=>{ speaking=false; document.getElementById('pause-btn').style.display='none'; };
    window.speechSynthesis.speak(u);
  };
  window.speechSynthesis.getVoices().length ? go() : (window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;go();});
}

async function speak(text){
  if(!voiceOn) return;
  stopSpeak();
  if(elKey){ const ok=await speakEl(text); if(ok) return; }
  speakBrowser(text);
}

function stopSpeak(){
  window.speechSynthesis?.cancel();
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  speaking=false;
  document.getElementById('pause-btn').style.display='none';
}

function toggleVoice(){
  voiceOn=!voiceOn;
  if(!voiceOn) stopSpeak();
  document.getElementById('vt-btn').textContent=voiceOn?'🔊 Voice On':'🔇 Voice Off';
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  initElKey();
  initSpeech();
  const w=`Hi Maggie. What can I help you with today?`;
  addMsg('bot',w);
  setTimeout(()=>speak(w),500);
});

// ── Speech Recognition ────────────────────────────────────────────────────────
function initSpeech(){
  if(!('SpeechRecognition' in window||'webkitSpeechRecognition' in window)){
    document.getElementById('mic-btn').textContent='Voice not supported — please use Chrome';
    document.getElementById('mic-btn').disabled=true;
    return;
  }
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(s=>{ micStream=s; })
    .catch(()=>showErr('Microphone access denied. Click the 🔒 icon in the address bar to allow it.'));

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();
  rec.continuous=false; rec.interimResults=true; rec.lang='en-US';

  rec.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) final+=t; else interim+=t;
    }
    if(final) pending+=final;
    document.getElementById('listen-txt').textContent=interim?`"${interim}"`:' 🎙️ Listening — speak now...';
  };

  rec.onerror=e=>{
    setListening(false);
    const msgs={'no-speech':"I didn't hear anything. Please tap the button and try again.",'not-allowed':"Microphone blocked. Click the 🔒 in the address bar to allow it."};
    showErr(msgs[e.error]||`Couldn't hear you clearly. Please try again.`);
  };

  rec.onend=()=>{
    setListening(false);
    if(pending.trim()){ const t=pending.trim(); pending=''; send(t); }
  };
}

function toggleMic(){
  if(!rec) return;
  if(listening){ rec.stop(); setListening(false); return; }
  stopSpeak(); pending=''; hideErr();
  try{ rec.start(); setListening(true); }
  catch{ setTimeout(()=>{ rec.start(); setListening(true); },300); }
}

function setListening(v){
  listening=v;
  const btn=document.getElementById('mic-btn');
  const bar=document.getElementById('listen-bar');
  if(v){
    btn.innerHTML='🛑&nbsp; Tap when done speaking';
    btn.classList.add('on'); bar.style.display='block';
  } else {
    btn.innerHTML='🎙️&nbsp; Tap to Speak';
    btn.classList.remove('on'); bar.style.display='none';
    document.getElementById('listen-txt').textContent='🎙️ Listening — speak now...';
  }
}

// ── Response engine ───────────────────────────────────────────────────────────
function getResponse(text){
  for(const s of SCRIPTS){ if(s.match.test(text)) return s; }
  return DEFAULT;
}

async function send(text){
  if(!text.trim()) return;
  hideErr();
  document.getElementById('qa').style.display='none';
  addMsg('user',text);
  detectIntent(text);
  showTyping();
  const resp=getResponse(text);
  setTimeout(()=>{
    hideTyping();
    addMsg('bot',resp.reply);
    if(resp.followups&&resp.followups.length) showFU(resp.followups);
    speak(resp.reply);
  }, 800+Math.random()*300);
}

function qs(t){ send(t); }
function sendTxt(){ const v=document.getElementById('txt').value.trim(); if(!v)return; document.getElementById('txt').value=''; updSend(); send(v); }
function onTxtInput(){ updSend(); }
function onTxtKey(e){ if(e.key==='Enter') sendTxt(); }
function updSend(){ document.getElementById('send').className=document.getElementById('txt').value.trim()?'on':''; }

// ── Follow-up chips ───────────────────────────────────────────────────────────
function showFU(chips){
  const area=document.getElementById('chat');
  const row=document.createElement('div'); row.className='fu-row';
  chips.forEach(c=>{
    const b=document.createElement('button'); b.className='fu'; b.textContent=c;
    b.onclick=()=>{ row.remove(); send(c); };
    row.appendChild(b);
  });
  area.appendChild(row); scroll();
}

// ── Info cards ────────────────────────────────────────────────────────────────
function detectIntent(t){
  t=t.toLowerCase();
  if(/lost|stolen|lock/i.test(t)) return showCard('locked');
  if(/dispute|don't recognize|do not recognize|didn't make|wrong charge|suspicious|unusual|not mine|these charges/i.test(t)) return showCard('dispute');
  if(/balance|how much.*available/i.test(t)) return showCard('balance');
  if(/transaction|history|spent|recent|show me/i.test(t)) return showCard('txns');
  if(/deposit|social security|when.*money|next.*payment|still get.*deposit|affect.*deposit/i.test(t)) return showCard('deposit');
  if(/pin|reset.*pin/i.test(t)) return showCard('pin');
  if(/fee|fees/i.test(t)) return showCard('fees');
}

function showCard(type){
  const a=document.getElementById('card-area');
  const txRows=TX.map(t=>`
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:14px">
      <div><div style="font-weight:600">${t.merchant}</div><div style="font-size:12px;color:#9ca3af">${t.date}</div></div>
      <span style="font-weight:700;color:${t.amt>0?'#16a34a':'#374151'}">${t.amt>0?'+':''}$${Math.abs(t.amt).toFixed(2)}</span>
    </div>`).join('');

  const C={
    balance:`<div class="card" style="background:#f0fdf4;border-color:#bbf7d0">
      <div style="font-size:13px;font-weight:700;color:#166534;margin-bottom:6px">💳 Direct Express •••• 4823</div>
      <div style="font-size:38px;font-weight:800;color:#14532d;line-height:1">$612.47</div>
      <div style="color:#166534;font-size:13px;margin-top:4px">Available Balance</div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #bbf7d0;font-size:13px;color:#166534">🕐 Next deposit: <strong>$967.00</strong> · April 3, 2026</div>
    </div>`,
    txns:`<div class="card" style="background:#fff;border-color:#e5e7eb">
      <div style="font-weight:700;color:#374151;margin-bottom:10px">📋 Recent Transactions</div>${txRows}
    </div>`,
    locked:`<div class="card" style="background:#fffbeb;border-color:#fde68a">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:42px;height:42px;border-radius:50%;background:#fef3c7;display:flex;align-items:center;justify-content:center;font-size:22px">🛡️</div>
        <div><div style="font-weight:700;color:#92400e;font-size:15px">Card Locked — You're Protected</div><div style="font-size:12px;color:#b45309">Card ending 4823</div></div>
      </div>
      ${['Card locked — no new charges possible','Replacement card being mailed to you','Arrives in 5–7 business days','You will receive a text when it ships'].map(s=>`<div class="crow">✅ <span style="color:#78350f">${s}</span></div>`).join('')}
    </div>`,
    dispute:`<div class="card" style="background:#eff6ff;border-color:#bfdbfe">
      <div style="font-weight:700;color:#1e40af;font-size:15px;margin-bottom:10px">⚠️ Dispute Opened</div>
      ${[['✅','Dispute recorded and assigned a case number'],['🕐','Investigation: up to 10 business days'],['💵','Provisional credit may be issued within 5 days'],['📱','We will text you with updates']].map(r=>`<div class="crow">${r[0]} <span style="font-size:14px;color:#1e3a8a">${r[1]}</span></div>`).join('')}
    </div>`,
    deposit:`<div class="card" style="background:#f5f3ff;border-color:#ddd6fe">
      <div style="font-weight:700;color:#6d28d9;margin-bottom:8px">🔄 Next Deposit</div>
      <div style="font-size:34px;font-weight:800;color:#4c1d95">$967.00</div>
      <div style="font-size:13px;color:#6d28d9;margin-top:3px">Social Security</div>
      <div style="margin-top:8px;font-size:13px;color:#5b21b6">🕐 Arriving <strong>Friday, April 3, 2026</strong></div>
    </div>`,
    pin:`<div class="card" style="background:#fdf4ff;border-color:#e9d5ff">
      <div style="font-weight:700;color:#6b21a8;margin-bottom:12px">🔒 Reset Your PIN</div>
      ${['Call 1-888-741-1115','Press 2 for PIN services','Follow the voice prompts (about 2 minutes)','New PIN works immediately'].map((s,i)=>`<div class="crow"><span style="width:24px;height:24px;border-radius:50%;background:#e9d5ff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#7e22ce;flex-shrink:0">${i+1}</span><span style="font-size:14px;color:#581c87">${s}</span></div>`).join('')}
    </div>`,
    fees:`<div class="card" style="background:#fff7ed;border-color:#fed7aa">
      <div style="font-weight:700;color:#c2410c;margin-bottom:10px">💳 Your Card Fees</div>
      ${[['Purchases anywhere','Free — always'],['1st ATM withdrawal / month','Free'],['Additional ATM withdrawals','$0.85 each'],['Cash at a bank counter','$1.50'],['Out-of-network ATM','$3.00'],['Balance check at register','Free'],['Monthly maintenance fee','$0 — no monthly fee']].map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #fed7aa;font-size:14px"><span style="color:#7c2d12">${r[0]}</span><strong style="color:#c2410c">${r[1]}</strong></div>`).join('')}
    </div>`
  };
  if(C[type]) a.innerHTML=C[type];
}

// ── Chat helpers ──────────────────────────────────────────────────────────────
function addMsg(role,text){
  const a=document.getElementById('chat');
  const row=document.createElement('div'); row.className=`msg-row ${role}`;
  if(role==='bot') row.innerHTML=`<div class="avatar">🛡</div><div class="bubble bot">${esc(text)}</div>`;
  else row.innerHTML=`<div class="bubble user">${esc(text)}</div>`;
  a.appendChild(row); scroll();
}
function showTyping(){
  const a=document.getElementById('chat');
  const row=document.createElement('div'); row.className='dots-row'; row.id='typing';
  row.innerHTML=`<div class="avatar">🛡</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  a.appendChild(row); scroll();
}
function hideTyping(){ document.getElementById('typing')?.remove(); }
function scroll(){ setTimeout(()=>document.getElementById('anchor').scrollIntoView({behavior:'smooth'}),60); }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showErr(m){ const e=document.getElementById('err-bar'); e.textContent=m; e.style.display='block'; }
function hideErr(){ document.getElementById('err-bar').style.display='none'; }
function toggleLarge(){ lgText=!lgText; document.body.classList.toggle('lg',lgText); document.getElementById('lt-btn').textContent=lgText?'🔡 Normal Text':'🔠 Large Text'; }
</script>
</body>
